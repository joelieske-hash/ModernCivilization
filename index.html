<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Civilization</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f5f1;
    color:#111;
    font-family:Georgia,"Times New Roman",serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

h1{
    font-size:clamp(48px,8vw,88px);
    letter-spacing:.12em;
    font-weight:400;
    line-height:1.05;
}

.line{
    width:70px;
    height:1px;
    background:#111;
    margin:40px auto;
}

.tagline{
    font-size:24px;
    letter-spacing:.04em;
    margin-bottom:14px;
}

.subtitle{
    font-size:18px;
    color:#444;
    letter-spacing:.03em;
    margin-bottom:48px;
}

.description{
    max-width:520px;
    margin:0 auto 50px;
    font-size:18px;
    line-height:1.8;
    color:#555;
}

a{
    color:#111;
    text-decoration:none;
    border-bottom:1px solid #111;
    padding-bottom:3px;
    transition:.2s;
}

a:hover{
    opacity:.6;
}

footer{
    margin-top:70px;
    font-size:13px;
    color:#888;
    letter-spacing:.08em;
}
</style>

</head>

<body>

<div class="container">

<h1>
MODERN<br>
CIVILIZATION
</h1>

<div class="line"></div>

<div class="tagline">
Heritage & Contemporary
</div>

<div class="subtitle">
Art, Design & Culture
</div>

<div class="description">
A journal exploring the intersection of heritage, design,
culture, philosophy, and the future.
</div>

<p>
<a href="https://instagram.com/moderncivilization" target="_blank">
Instagram
</a>
</p>

<footer>
Launching Soon
</footer>

</div>

</body>
</html>
